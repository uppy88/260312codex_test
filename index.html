<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パステル電卓</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>パステル電卓</h1>
    <section class="calculator" aria-label="計算機">
      <label for="display" class="sr-only">表示</label>
      <input id="display" class="display" type="text" value="0" readonly />

      <div class="keys">
        <button type="button" data-action="clear" class="key function">AC</button>
        <button type="button" data-action="delete" class="key function">⌫</button>
        <button type="button" data-action="percent" class="key function">%</button>
        <button type="button" data-action="operator" data-value="/" class="key operator">÷</button>

        <button type="button" data-action="number" data-value="7" class="key">7</button>
        <button type="button" data-action="number" data-value="8" class="key">8</button>
        <button type="button" data-action="number" data-value="9" class="key">9</button>
        <button type="button" data-action="operator" data-value="*" class="key operator">×</button>

        <button type="button" data-action="number" data-value="4" class="key">4</button>
        <button type="button" data-action="number" data-value="5" class="key">5</button>
        <button type="button" data-action="number" data-value="6" class="key">6</button>
        <button type="button" data-action="operator" data-value="-" class="key operator">−</button>

        <button type="button" data-action="number" data-value="1" class="key">1</button>
        <button type="button" data-action="number" data-value="2" class="key">2</button>
        <button type="button" data-action="number" data-value="3" class="key">3</button>
        <button type="button" data-action="operator" data-value="+" class="key operator">+</button>

        <button type="button" data-action="number" data-value="0" class="key zero">0</button>
        <button type="button" data-action="decimal" data-value="." class="key">.</button>
        <button type="button" data-action="equals" class="key equals">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
